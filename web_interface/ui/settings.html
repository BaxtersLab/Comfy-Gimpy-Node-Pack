<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Comfy Gimpy Studio</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1>Settings</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/models">Models</a>
            <a href="/templates">Templates</a>
            <a href="/styles">Styles</a>
            <a href="/workflows">Workflows</a>
            <a href="/settings" class="active">Settings</a>
        </nav>
    </header>

    <main>
        <section id="comfyui-settings">
            <h2>ComfyUI Settings</h2>
            <form id="settings-form">
                <div class="form-group">
                    <label for="comfyui-host">ComfyUI Host:</label>
                    <input type="text" id="comfyui-host" name="comfyui_host">
                </div>

                <div class="form-group">
                    <label for="comfyui-port">ComfyUI Port:</label>
                    <input type="number" id="comfyui-port" name="comfyui_port">
                </div>

                <div class="form-group">
                    <label for="bridge-host">Bridge Host:</label>
                    <input type="text" id="bridge-host" name="bridge_host">
                </div>

                <div class="form-group">
                    <label for="bridge-port">Bridge Port:</label>
                    <input type="number" id="bridge-port" name="bridge_port">
                </div>

                <div class="form-group">
                    <label for="log-level">Log Level:</label>
                    <select id="log-level" name="log_level">
                        <option value="DEBUG">Debug</option>
                        <option value="INFO">Info</option>
                        <option value="WARNING">Warning</option>
                        <option value="ERROR">Error</option>
                        <option value="CRITICAL">Critical</option>
                    </select>
                </div>

                <button type="submit">Save Settings</button>
            </form>
        </section>

        <section id="directories">
            <h2>Directory Settings</h2>
            <div id="directory-info">
                <p>Loading directory information...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Comfy Gimpy Studio</p>
    </footer>

    <script src="/static/js/settings.js"></script>
</body>
</html>
